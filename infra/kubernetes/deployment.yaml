apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-devops-assistant
  namespace: ai-devops-assistant
  labels:
    app: ai-devops-assistant
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-devops-assistant
  template:
    metadata:
      labels:
        app: ai-devops-assistant
    spec:
      containers:
      - name: ai-devops-assistant
        image: ai-devops:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: ai-devops-config
        - secretRef:
            name: ai-devops-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        # Graceful shutdown
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]

---
apiVersion: v1
kind: Service
metadata:
  name: ai-devops-assistant
  namespace: ai-devops-assistant
  labels:
    app: ai-devops-assistant
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: ai-devops-assistant

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-devops-assistant-ingress
  namespace: ai-devops-assistant
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: ai-devops-assistant.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-devops-assistant
            port:
              number: 80