# NOTE: This is a TEMPLATE showing the structure of required secrets.
# DO NOT commit actual secrets to version control!
#
# For production deployments, use one of the following approaches:
# 1. External Secrets Operator (ESO) - recommended for cloud-native setups
# 2. HashiCorp Vault with Kubernetes auth
# 3. Cloud provider secret managers (AWS Secrets Manager, Azure Key Vault, GCP Secret Manager)
# 4. Sealed Secrets (sealed-secrets)
# 5. Manual secret creation via kubectl: kubectl create secret generic ai-devops-secrets
#
# See SECRETS_MANAGEMENT.md for detailed setup instructions.

apiVersion: v1
kind: Secret
metadata:
  name: ai-devops-secrets
  namespace: ai-devops-assistant
  annotations:
    description: "Application secrets. These should be injected from a secure
      source, not committed."
type: Opaque
stringData:
  # Non-sensitive configuration (can be in ConfigMap)
  OLLAMA_BASE_URL: "http://ollama:11434"
  PROMETHEUS_URL: "http://prometheus:9090"
  CHROMA_PERSIST_DIR: "/data/chroma"

  # SENSITIVE: Use external secret management for these values
  # These placeholders should be replaced by your secret management solution
  # Examples shown for reference only

  # Application Secrets
  SECRET_KEY: "INJECTED_FROM_SECRET_MANAGER"
  DATABASE_URL: "INJECTED_FROM_SECRET_MANAGER"

  # CI/CD Provider Credentials
  # Azure DevOps
  AZURE_DEVOPS_ORG: "INJECTED_FROM_SECRET_MANAGER"
  AZURE_DEVOPS_PROJECT: "INJECTED_FROM_SECRET_MANAGER"
  AZURE_DEVOPS_PAT: "INJECTED_FROM_SECRET_MANAGER"

  # Jenkins
  JENKINS_URL: "http://jenkins:8080"
  JENKINS_USER: "INJECTED_FROM_SECRET_MANAGER"
  JENKINS_API_TOKEN: "INJECTED_FROM_SECRET_MANAGER"

  # GitHub
  GITHUB_OWNER: "INJECTED_FROM_SECRET_MANAGER"
  GITHUB_REPO: "INJECTED_FROM_SECRET_MANAGER"
  GITHUB_TOKEN: "INJECTED_FROM_SECRET_MANAGER"
