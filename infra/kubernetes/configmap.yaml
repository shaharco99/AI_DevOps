apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-devops-config
  namespace: ai-devops
data:
  APP_NAME: "AI DevOps"
  APP_VERSION: "0.1.0"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_LOG_LEVEL: "INFO"
  API_ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  LLM_MODEL: "llama3"
  LLM_TEMPERATURE: "0.7"
  LLM_MAX_TOKENS: "2048"
  LLM_TIMEOUT: "60"
  ENABLE_RAG: "true"
  ENABLE_K8S_TOOL: "true"
  ENABLE_SQL_TOOL: "true"
  ENABLE_METRICS_TOOL: "true"
  ENABLE_LOG_TOOL: "true"
  ENABLE_PIPELINE_TOOL: "true"
  K8S_NAMESPACE: "ai-devops-assistant"
  K8S_VERIFY_SSL: "true"
  K8S_TIMEOUT: "30"
  PROMETHEUS_TIMEOUT: "10"
  RAG_CHUNK_SIZE: "1000"
  RAG_CHUNK_OVERLAP: "100"
  EMBEDDING_MODEL: "nomic-embed-text"
  CACHE_TTL_SHORT: "60"
  CACHE_TTL_MEDIUM: "300"
  CACHE_TTL_LONG: "3600"
  API_RESPONSE_TIMEOUT: "30"
  MAX_REQUEST_SIZE: "10485760"
