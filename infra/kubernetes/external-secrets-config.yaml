---
# External Secrets Operator Example Configuration
# This demonstrates how to set up ESO for AWS Secrets Manager integration
#
# Prerequisites:
# 1. Install External Secrets Operator:
#    helm repo add external-secrets https://charts.external-secrets.io
#    helm install external-secrets external-secrets/external-secrets -n external-secrets-system --create-namespace
#
# 2. Configure AWS IAM role for ESO (see comments below)
#
# For other secret backends, see: https://external-secrets.io/latest/introduction/overview/

---
# Step 1: Create SecretStore that connects to AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: ai-devops-secret-store
  namespace: ai-devops-assistant
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1  # Change to your AWS region
      auth:
        jwt:
          # Use IRSA (IAM Roles for Service Accounts) - Recommended
          serviceAccountRef:
            name: external-secrets-sa
          # Alternative: Use static AWS credentials (less secure)
          # secretRef:
          #   accessKeyIDSecretRef:
          #     name: aws-credentials
          #     key: access-key
          #   secretAccessKeySecretRef:
          #     name: aws-credentials
          #     key: secret-access-key

---
# Step 2: ServiceAccount for IRSA (if using Kubernetes IRSA)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: ai-devops-assistant
  annotations:
    # For EKS IRSA - adjust the ARN to your AWS account
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/external-secrets-role

---
# Step 3: Create ExternalSecret resource
# This pulls secrets from AWS Secrets Manager and creates a Kubernetes Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ai-devops-secrets
  namespace: ai-devops-assistant
spec:
  # How often to refresh/sync the secret (check for updates)
  refreshInterval: 1h

  # Reference to the SecretStore
  secretStoreRef:
    name: ai-devops-secret-store
    kind: SecretStore

  # Specification of the target secret
  target:
    name: ai-devops-secrets  # Name of the Kubernetes secret to create/update
    creationPolicy: Owner    # Let ESO manage this secret
    template:
      engineVersion: v2
      data:
        # Map keys from AWS Secrets Manager to Kubernetes secret keys
        SECRET_KEY: |
          {{ .secretKey }}
        DATABASE_URL: |
          {{ .databaseUrl }}
        AZURE_DEVOPS_ORG: |
          {{ .azureDevOpsOrg }}
        AZURE_DEVOPS_PROJECT: |
          {{ .azureDevOpsProject }}
        AZURE_DEVOPS_PAT: |
          {{ .azureDevOpsPat }}
        JENKINS_URL: \"http://jenkins:8080\"
        JENKINS_USER: |
          {{ .jenkinsUser }}
        JENKINS_API_TOKEN: |
          {{ .jenkinsApiToken }}
        GITHUB_OWNER: |
          {{ .githubOwner }}
        GITHUB_REPO: |
          {{ .githubRepo }}
        GITHUB_TOKEN: |
          {{ .githubToken }}

  # Define mappings from AWS Secrets Manager to template variables
  data:
    - secretKey: secretKey
      remoteRef:
        key: ai-devops/SECRET_KEY

    - secretKey: databaseUrl
      remoteRef:
        key: ai-devops/DATABASE_URL

    - secretKey: azureDevOpsOrg
      remoteRef:
        key: ai-devops/AZURE_DEVOPS_ORG

    - secretKey: azureDevOpsProject
      remoteRef:
        key: ai-devops/AZURE_DEVOPS_PROJECT

    - secretKey: azureDevOpsPat
      remoteRef:
        key: ai-devops/AZURE_DEVOPS_PAT

    - secretKey: jenkinsUser
      remoteRef:
        key: ai-devops/JENKINS_USER

    - secretKey: jenkinsApiToken
      remoteRef:
        key: ai-devops/JENKINS_API_TOKEN

    - secretKey: githubOwner
      remoteRef:
        key: ai-devops/GITHUB_OWNER

    - secretKey: githubRepo
      remoteRef:
        key: ai-devops/GITHUB_REPO

    - secretKey: githubToken
      remoteRef:
        key: ai-devops/GITHUB_TOKEN

---
# Alternative Example: Using HashiCorp Vault with External Secrets Operator
# Uncomment and configure if using Vault instead of AWS Secrets Manager
#
# apiVersion: external-secrets.io/v1beta1
# kind: SecretStore
# metadata:
#   name: vault-secret-store
#   namespace: ai-devops-assistant
# spec:
#   provider:
#     vault:
#       server: \"https://vault.example.com:8200\"
#       path: \"secret\"
#       version: \"v2\"
#       auth:
#         kubernetes:
#           mountPath: \"kubernetes\"
#           role: \"ai-devops-role\"
#           serviceAccountRef:
#             name: external-secrets-sa

---
# For deployment: Apply these manifests with:
# 1. Set up AWS IAM role for service account (IRSA):
#    eksctl create iamserviceaccount --name external-secrets-sa \\
#      --namespace ai-devops-assistant --cluster my-cluster \\
#      --role-name external-secrets-role \\
#      --attach-policy-arn arn:aws:iam::aws:policy/SecretsManagerReadWrite \\
#      --approve
#
# 2. Create secrets in AWS Secrets Manager:
#    aws secretsmanager create-secret --name ai-devops/SECRET_KEY \\
#      --secret-string 'your-secret-key-value'
#    aws secretsmanager create-secret --name ai-devops/AZURE_DEVOPS_PAT \\
#      --secret-string 'your-pat-token'
#    # ... repeat for other secrets
#
# 3. Apply this file:
#    kubectl apply -f external-secrets-config.yaml
#
# 4. Verify the secret was created:
#    kubectl get secret ai-devops-secrets -n ai-devops-assistant
#    kubectl describe secret ai-devops-secrets -n ai-devops-assistant

---
