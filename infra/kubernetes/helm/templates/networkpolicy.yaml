{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ai-devops-assistant.fullname" . }}
  labels:
    {{- include "ai-devops-assistant.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ai-devops-assistant.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- if .Values.networkPolicy.allowedIngressPods }}
        {{- range .Values.networkPolicy.allowedIngressPods }}
        - podSelector:
            matchLabels:
              {{- toYaml . | nindent 14 }}
        {{- end }}
        {{- else }}
        - podSelector: {}
        {{- end }}
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
    # Allow access to Kubernetes API
    - to:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: TCP
          port: 443
    # Allow access to other services in the same namespace
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
    {{- if .Values.networkPolicy.allowedEgressPods }}
    {{- range .Values.networkPolicy.allowedEgressPods }}
    - to:
        - podSelector:
            matchLabels:
              {{- toYaml . | nindent 14 }}
    {{- end }}
    {{- end }}
{{- end }}
