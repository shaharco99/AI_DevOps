# Prometheus configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "ai-devops-assistant"

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  - "alerts.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: [ "localhost:9090" ]

  # FastAPI backend
  - job_name: "backend"
    static_configs:
      - targets: [ "backend:8000" ]
    metrics_path: "/metrics"
    scrape_interval: 30s

  # PostgreSQL (if postgres_exporter is running)
  - job_name: "postgres"
    static_configs:
      - targets: [ "localhost:9187" ]
    scrape_interval: 30s

  # Node exporter (if available)
  - job_name: "node"
    static_configs:
      - targets: [ "localhost:9100" ]
    scrape_interval: 30s
