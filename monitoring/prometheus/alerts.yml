# Alert rules for Prometheus

groups:
  - name: ai_devops_copilot
    interval: 30s
    rules:
      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Backend is down"
          description: "Backend service has been down for more than 5 minutes"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for the last 5 minutes"

      - alert: HighLatency
        expr: histogram_quantile(0.95, http_request_duration_seconds_bucket) > 1.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "P95 latency is above 1 second"

      - alert: DatabaseConnectionPoolExhausted
        expr: db_connection_pool_available_connections < 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "Less than 5 available database connections"

      - alert: HighMemoryUsage
        expr: container_memory_usage_bytes{name="ai-devops-copilot-backend"} / 1024 /
          1024 / 1024 > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Backend memory usage is above 2GB"
