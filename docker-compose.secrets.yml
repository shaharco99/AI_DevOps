# docker-compose example with secrets best practices
# This file shows how to properly handle secrets in Docker Compose
#
# For local development with secrets:
# 1. Create a .secrets directory: mkdir .secrets
# 2. Add secret files:
#    echo "your-secret-key" > .secrets/secret_key
#    echo "your-db-password" > .secrets/db_password
#    etc.
# 3. Uncomment the env_file and secrets sections below
#
# For production: Use Docker Stack with secrets or move to a dedicated secret management system


services:
  # ========================================================================
  # PostgreSQL Database
  # ========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: ai-devops-postgres
    environment:
      POSTGRES_USER: devops_user
      # For production, use secrets file instead:
      # POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_PASSWORD: devops_password
      POSTGRES_DB: devops
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - devops
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U devops_user -d devops" ]
      interval: 10s
      timeout: 5s
      retries: 5
    # Uncomment to use secret files (Docker Stack or Swarm)
    # secrets:
    #   - db_password

    # ========================================================================
    # Ollama LLM Service
    # ========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: ai-devops-ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - devops
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 30s
      timeout: 10s
      retries: 3
    command: serve

  # ========================================================================
  # FastAPI Backend
  # ========================================================================
  backend:
    build: .
    container_name: ai-devops-backend
    # Load environment variables from .env.local (contains secrets)
    # WARNING: .env.local is in .gitignore and should not be committed
    env_file:
      - .env.local
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      DATABASE_URL: postgresql+asyncpg://devops_user:devops_password@postgres:5432/devops
      PROMETHEUS_URL: http://prometheus:9090
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./ai_devops_assistant:/app/ai_devops_assistant
    networks:
      - devops
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    # Uncomment to use secrets from files (Docker Stack/Swarm)
    # secrets:
    #   - secret_key
    #   - azure_devops_pat
    #   - jenkins_api_token
    #   - github_token

    # ========================================================================
    # Prometheus Monitoring
    # ========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: ai-devops-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    networks:
      - devops
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:9090/-/healthy",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  # ========================================================================
  # Grafana Dashboards
  # ========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: ai-devops-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - devops
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3

# ============================================================================
# Secrets Configuration (for Docker Stack/Swarm)
# Uncomment this section and the secrets lines above when using Docker Stack
# For Docker Compose, use .env.local file instead
# ============================================================================
# secrets:
#   secret_key:
#     file: ./.secrets/secret_key
#   db_password:
#     file: ./.secrets/db_password
#   azure_devops_pat:
#     file: ./.secrets/azure_devops_pat
#   jenkins_api_token:
#     file: ./.secrets/jenkins_api_token
#   github_token:
#     file: ./.secrets/github_token

# ============================================================================
# Networks
# ============================================================================
networks:
  devops:
    driver: bridge

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
  ollama_data:
  prometheus_data:
  grafana_data:

    # ============================================================================
    # Usage Notes
    # ============================================================================
    #
    # Local Development (with env_file):
    #   1. Create .env.local with your secrets
    #   2. Run: docker compose up -d
    #   3. Secrets are loaded from .env.local
    #
    # Production with Docker Stack:
    #   1. Uncomment the 'secrets:' sections
    #   2. Create .secrets/ directory with secret files
    #   3. Deploy with: docker stack deploy -c docker-compose.yml ai-devops
    #   4. Secrets are injected into containers securely
    #
    # Best Practices:
    #   - Never commit .env files or .secrets/ directory
    #   - Use different credentials for each environment
    #   - Rotate secrets regularly
    #   - Use external secret managers for production (Vault, AWS Secrets Manager, etc.)
    #   - For sensitive data, mount secrets as read-only files instead of env vars
