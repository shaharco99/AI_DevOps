name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ========================================================================
  # Code Quality & Linting
  # ========================================================================
  lint:
    name: Lint and Static Analysis
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run Ruff lint
        run: ruff check ai_devops_assistant tests

      - name: Run isort check
        run: isort --check-only --profile black ai_devops_assistant tests

      - name: Run Black format check
        run: black --check ai_devops_assistant tests

      - name: Run Mypy type check
        run: mypy ai_devops_assistant --ignore-missing-imports --no-strict-optional

      - name: Run Pylint
        run: pylint ai_devops_assistant --disable=all --enable=E,F --fail-under=9.0
        continue-on-error: true

  # ========================================================================
  # Unit Tests
  # ========================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: devops_user
          POSTGRES_PASSWORD: devops_password
          POSTGRES_DB: devops_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev,test]"

      - name: Run unit tests with coverage
        env:
          DATABASE_URL: "postgresql+asyncpg://devops_user:devops_password@localhost:5432/devops_test"
        run: |
          pytest tests/unit -v \
            --cov=ai_devops_assistant \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=junit.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unit-${{ matrix.python-version }}
          name: ai-devops-unit-${{ matrix.python-version }}
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.python-version }}
          path: junit.xml

  # ========================================================================
  # Integration Tests
  # ========================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: devops_user
          POSTGRES_PASSWORD: devops_password
          POSTGRES_DB: devops_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev,test]"

      - name: Run integration tests
        env:
          DATABASE_URL: "postgresql+asyncpg://devops_user:devops_password@localhost:5432/devops_test"
        run: pytest tests/integration -v --junitxml=junit-integration.xml
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-integration-results
          path: junit-integration.xml

  # ========================================================================
  # Security Scanning (SAST)
  # ========================================================================
  security-scan:
    name: Security Scan (SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit semgrep

      - name: Run Bandit security scan
        run: |
          bandit -r ai_devops_assistant -f json -o bandit-report.json --skip B101,B601
        continue-on-error: true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
        if: always()

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
        continue-on-error: true

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        if: always()

  # ========================================================================
  # Dependency Scanning (SCA)
  # ========================================================================
  dependency-scan:
    name: Dependency Vulnerability Scan (SCA)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Run pip-audit vulnerability scan
        run: pip-audit -r requirements.txt
        continue-on-error: true

  # ========================================================================
  # Docker Build
  # ========================================================================
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ai-devops-assistant:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========================================================================
  # Container Security Scanning
  # ========================================================================
  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ai-devops-assistant:scan

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ai-devops-assistant:scan
          format: sarif
          output: trivy-image-results.sarif
        continue-on-error: true

      - name: Upload container scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif
        if: always()

  # ========================================================================
  # Documentation & Markdown Linting
  # ========================================================================
  docs:
    name: Documentation & Markdown Linting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install markdownlint
        run: npm install -g markdownlint-cli2

      - name: Lint Markdown files
        run: markdownlint-cli2 "**/*.md" "#node_modules"
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install codespell
        run: pip install codespell

      - name: Check for spelling errors
        run: codespell --ignore-words-list=cna,nd,sav,ser,ans --skip=.git,.*,*.pyc,.env.example,*.lock
        continue-on-error: true

  # ========================================================================
  # Final Status Check
  # ========================================================================
  status-check:
    name: Status Check
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, security-scan, dependency-scan, docker-build, container-scan, docs]
    if: always()

    steps:
      - name: Check overall status
        run: |
          if [ "${{ needs.lint.result }}" == "failure" ]; then
            echo "❌ Lint checks failed"
            exit 1
          fi
          if [ "${{ needs.unit-tests.result }}" == "failure" ]; then
            echo "❌ Unit tests failed"
            exit 1
          fi
          echo "✅ All critical checks passed"
